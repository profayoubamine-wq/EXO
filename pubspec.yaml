name: exo_ayoub
description: EXO Ayoub - Centre de soutien scolaire - Emploi du temps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # PDF generation
  pdf: ^3.10.8
  printing: ^5.13.1
  # UUID generation
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Hive code generator
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
